name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project structure
        run: |
          rm -rf android
          mkdir -p assets
          mv pubspec.yaml pubspec.yaml.bak
          mv lib lib.bak
          flutter create --platforms android --org com.babytracker baby_tracker_temp
          mv baby_tracker_temp/android .
          rm -rf baby_tracker_temp
          mv lib.bak lib
          mv pubspec.yaml.bak pubspec.yaml

      - name: Override Kotlin in build configuration
        run: |
          # Add Kotlin version override to android/app/build.gradle
          # This forces the kotlin compiler to use a specific version
          if ! grep -q "kotlinOptions" android/app/build.gradle; then
            # Add kotlinOptions block after android { }
            sed -i '/android {/a\
            \
            kotlinOptions {\
                jvmTarget = "17"\
            }' android/app/build.gradle
          fi
          
          # Also add kotlinstdlib exclusion in build.gradle
          if ! grep -q "configurations.all" android/build.gradle; then
            cat >> android/build.gradle << 'EOF'

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                if (namespace == null) {
                    namespace = project.group.toString()
                }
            }
        }
    }
}
EOF
          fi
          
          # Add JVM args to gradle.properties to skip Kotlin metadata check
          cat >> android/gradle.properties << 'EOF'
org.gradle.jvmargs=-Xmx2048m -Dkotlin.daemon.jvmargs=-Xmx1536m
android.useAndroidX=true
android.enableJetifier=true
kotlin.daemon.jvmargs=-Xmx1536m
kotlin.jvm.target.validation.mode=warning
EOF
          
          echo "Build configuration updated"

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baby-tracker-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          tag_name: latest
          name: Baby Tracker v1.0.0
          body: "宝宝喂养记录 App — 自动构建版本"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
