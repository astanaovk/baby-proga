name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Generate Android project structure
        run: |
          # Create a temp project to get android/ folder, then restore our files
          mv pubspec.yaml pubspec.yaml.bak
          mv lib lib.bak
          flutter create --platforms android --org com.babytracker baby-tracker-temp
          mv baby-tracker-temp/android .
          rm -rf baby-tracker-temp
          mv lib.bak lib
          mv pubspec.yaml.bak pubspec.yaml

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build debug APK
        run: |
          flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baby-tracker-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          tag_name: latest
          name: Baby Tracker v1.0.0
          body: "宝宝喂养记录 App — 自动构建版本"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
