name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "version:" pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate Android project structure
        run: |
          rm -rf android
          mkdir -p assets
          mv pubspec.yaml pubspec.yaml.bak
          mv lib lib.bak
          flutter create --platforms android --org com.babytracker baby_tracker_temp
          mv baby_tracker_temp/android .
          rm -rf baby_tracker_temp
          mv lib.bak lib
          mv pubspec.yaml.bak pubspec.yaml
          rm -f pubspec.lock

      - name: Set app name in AndroidManifest
        run: |
          sed -i 's/android:label="[^"]*"/android:label="宝宝记录"/g' android/app/src/main/AndroidManifest.xml

      - name: Create cartoon icon
        env:
          ICON_XML: |
            <?xml version="1.0" encoding="utf-8"?>
            <vector xmlns:android="http://schemas.android.com/apk/res/android"
                android:width="108dp"
                android:height="108dp"
                android:viewportWidth="108"
                android:viewportHeight="108">
                <path android:fillColor="#E3F2FD" android:pathData="M54,54m-50,0a50,50 0,1 1,100 0a50,50 0,1 1,-100 0"/>
                <path android:fillColor="#FFE0B2" android:pathData="M54,54m-35,0a35,35 0,1 1,70 0a35,35 0,1 1,-70 0"/>
                <path android:fillColor="#90CAF9" android:pathData="M25,45 Q30,20 54,18 Q78,20 83,45 Q78,35 54,33 Q30,35 25,45"/>
                <path android:pathData="M38,52 Q42,48 46,52" android:strokeWidth="2.5" android:strokeColor="#5D4037"/>
                <path android:pathData="M62,52 Q66,48 70,52" android:strokeWidth="2.5" android:strokeColor="#5D4037"/>
                <path android:fillColor="#FFAB91" android:fillAlpha="0.5" android:pathData="M30,58m-6,0a6,4 0,1 1,12 0a6,4 0,1 1,-12 0"/>
                <path android:fillColor="#FFAB91" android:fillAlpha="0.5" android:pathData="M78,58m-6,0a6,4 0,1 1,12 0a6,4 0,1 1,-12 0"/>
                <path android:pathData="M44,62 Q54,72 64,62" android:strokeWidth="2.5" android:strokeColor="#E57373"/>
                <path android:fillColor="#FFD54F" android:pathData="M78,28 L80,34 L86,34 L81,38 L83,44 L78,40 L73,44 L75,38 L70,34 L76,34 Z"/>
                <path android:fillColor="#F48FB1" android:pathData="M30,30 C27,27 22,27 22,32 C22,37 30,42 30,42 C30,42 38,37 38,32 C38,27 33,27 30,30"/>
            </vector>
        run: |
          mkdir -p android/app/src/main/res/drawable
          echo "$ICON_XML" > android/app/src/main/res/drawable/ic_launcher.xml
          rm -f android/app/src/main/res/mipmap-*/ic_launcher.png

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baby-tracker-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 5

      - name: Download APK
        if: github.event_name != 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: baby-tracker-apk
          path: ./apk/

      - name: Create Release
        if: github.event_name != 'pull_request'
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: 宝宝记录 v${{ steps.version.outputs.version }}
          body: |
            ## 🍼 宝宝记录 v${{ steps.version.outputs.version }}

            ### 更新内容
            - ✅ 全新卡通风格Logo
            - ✅ App名称改为"宝宝记录"

            ### 安装说明
            1. 下载下方 APK 文件
            2. 开启"允许安装未知来源应用"
            3. 点击 APK 安装
          files: ./apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
